name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
      - run: nix develop --command biome ci .
      - run: nix develop --command npm ci
      - run: nix develop --command npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    concurrency:
      group: itch-deploy
    env:
      ITCH_TARGET: abbradar/office-hell
      ITCH_CHANNEL: html5
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install butler
        run: |
          curl -sL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip -d "$HOME/.butler"
          chmod +x "$HOME/.butler/butler"
          echo "$HOME/.butler" >> "$GITHUB_PATH"
      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push dist "$ITCH_TARGET:$ITCH_CHANNEL" \
            --userversion "${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
