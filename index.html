<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10101a" />
    <title>Office Hell</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100dvh;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        display: grid;
        place-items: center;
        /* Honour the top/side bezels (notch, rounded corners) so the play
           area never sits under hardware. The bottom inset is intentionally
           NOT padded — the touch-control band lives down there, and the home
           indicator sitting over a button is harmless. */
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-left: env(safe-area-inset-left);
      }
      #game, #viewport, #game canvas {
        touch-action: none;
        display: block;
      }
      /* #viewport is Phaser's parent, so its bounds are what FIT mode scales
         against. Both wrappers must fill the body's content box; otherwise
         the parent collapses to canvas size and FIT has nothing to scale to.
         (Phaser's expandParent only adjusts the parent itself, not its
         ancestors — without explicit sizing on #game, #viewport's 100%
         resolves against a min-content #game.) */
      #game, #viewport {
        width: 100%;
        height: 100%;
      }
      #game canvas {
        image-rendering: pixelated;
        max-width: 100%;
        max-height: 100%;
      }
      /* In fullscreen the body's safe-area padding doesn't apply (the
         fullscreen element renders in the top layer, outside the body's
         layout). Re-apply the top inset on #game itself so the canvas
         clears the notch/bezels. */
      #game:fullscreen {
        padding-top: env(safe-area-inset-top);
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="game"><div id="viewport"></div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
